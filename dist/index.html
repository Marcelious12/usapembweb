<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Eksplorasi Wisata Alam Jabodetabek - Agrowisata Gunung Mas Bogor">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Wisata Alam Jabodetabek - Agrowisata Gunung Mas Bogor</title>
  <script src="https://unpkg.com/vue@3.4.0/dist/vue.global.js"></script>
  <script src="https://unpkg.com/vue-router@4.2.0/dist/vue-router.global.js"></script>
  <style>
    /* === RESET & BASE === */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #2B2D42; background: #fff; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4, h5, h6 { font-family: 'Playfair Display', Georgia, serif; font-weight: 600; line-height: 1.2; }
    a { text-decoration: none; color: inherit; transition: color 0.3s; }
    img { max-width: 100%; height: auto; display: block; }
    button { cursor: pointer; border: none; background: none; font-family: inherit; }

    /* === CSS VARIABLES === */
    :root {
      --primary-dark: #1B4332; --primary: #2D6A4F; --primary-medium: #40916C;
      --primary-light: #52B788; --primary-lighter: #95D5B2; --primary-lightest: #D8F3DC;
      --white: #fff; --cream: #FAF3DD; --cream-dark: #F5F0E8;
      --gray-100: #F8F9FA; --gray-200: #E8EDDF; --gray-300: #DAD7CD;
      --gray-400: #B7B7A4; --gray-500: #8D99AE; --gray-600: #6C757D;
      --gray-700: #495057; --gray-800: #343A40; --gray-900: #2B2D42;
      --accent: #D4A373; --accent-light: #E9C46A;
      --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 24px; --radius-full: 9999px;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04); --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 30px rgba(0,0,0,0.12); --shadow-xl: 0 16px 48px rgba(0,0,0,0.16);
    }

    /* === UTILITIES === */
    .container { width: 100%; max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
    .section { padding: 6rem 0; }
    .section-header { text-align: center; margin-bottom: 3rem; }
    .section-label {
      display: inline-block; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--primary); background: var(--primary-lightest);
      padding: 0.25rem 1rem; border-radius: var(--radius-full); margin-bottom: 1rem;
    }
    .section-title { font-size: clamp(1.75rem, 4vw, 2.75rem); font-weight: 700; margin-bottom: 1rem; }
    .section-subtitle { font-size: 1.1rem; color: var(--gray-600); max-width: 600px; margin: 0 auto; }

    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.875rem 2rem; font-size: 0.95rem; font-weight: 600;
      border-radius: var(--radius-full); transition: all 0.3s; cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: var(--white); box-shadow: 0 4px 14px rgba(45,106,79,0.3); }
    .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(45,106,79,0.4); }
    .btn-outline { background: transparent; color: var(--primary); border: 2px solid var(--primary); }
    .btn-outline:hover { background: var(--primary); color: var(--white); transform: translateY(-2px); }
    .btn-white { background: var(--white); color: var(--primary); box-shadow: var(--shadow-md); }
    .btn-white:hover { background: var(--cream); transform: translateY(-2px); box-shadow: var(--shadow-lg); }

    /* === NAVBAR === */
    .navbar { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: 1rem 0; transition: all 0.3s; background: transparent; }
    .navbar-scrolled { background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); box-shadow: var(--shadow-sm); padding: 0.5rem 0; }
    .navbar-container { display: flex; align-items: center; justify-content: space-between; }
    .navbar-logo { display: flex; align-items: center; gap: 0.5rem; z-index: 1001; }
    .logo-icon { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: var(--primary); color: var(--white); border-radius: var(--radius-md); }
    .logo-text { display: flex; flex-direction: column; }
    .logo-title { font-family: 'Playfair Display'; font-size: 1.1rem; font-weight: 700; color: var(--white); transition: color 0.3s; }
    .navbar-scrolled .logo-title { color: var(--gray-900); }
    .logo-subtitle { font-size: 0.65rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,255,255,0.8); transition: color 0.3s; }
    .navbar-scrolled .logo-subtitle { color: var(--gray-500); }
    .navbar-nav { display: flex; align-items: center; gap: 0.25rem; }
    .nav-link { padding: 0.5rem 1rem; font-size: 0.875rem; font-weight: 500; color: rgba(255,255,255,0.85); border-radius: var(--radius-full); transition: all 0.3s; }
    .navbar-scrolled .nav-link { color: var(--gray-700); }
    .nav-link:hover, .nav-link-active { color: var(--white) !important; background: rgba(255,255,255,0.15) !important; }
    .navbar-scrolled .nav-link:hover, .navbar-scrolled .nav-link-active { color: var(--primary) !important; background: var(--primary-lightest) !important; }
    .menu-toggle { display: none; flex-direction: column; gap: 5px; padding: 0.5rem; z-index: 1001; }
    .menu-bar { display: block; width: 24px; height: 2px; background: var(--white); border-radius: 2px; transition: all 0.3s; }
    .navbar-scrolled .menu-bar { background: var(--gray-800); }
    .menu-bar-open:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
    .menu-bar-open:nth-child(2) { opacity: 0; }
    .menu-bar-open:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }
    .navbar-mobile { display: none; position: absolute; top: 100%; left: 0; right: 0; background: rgba(255,255,255,0.98); backdrop-filter: blur(20px); padding: 1rem; box-shadow: var(--shadow-lg); border-radius: 0 0 var(--radius-lg) var(--radius-lg); }
    .mobile-nav-link { display: block; padding: 1rem 1.5rem; font-size: 1rem; font-weight: 500; color: var(--gray-700); border-radius: var(--radius-md); transition: all 0.3s; margin-bottom: 0.25rem; }
    .mobile-nav-link:hover, .mobile-nav-link-active { background: var(--primary-lightest); color: var(--primary); }
    .navbar-open { background: rgba(255,255,255,0.98) !important; backdrop-filter: blur(12px); }
    .navbar-open .logo-title, .navbar-open .logo-subtitle { color: var(--gray-900) !important; }
    .navbar-open .menu-bar { background: var(--gray-800) !important; }

    /* === FOOTER === */
    .footer { margin-top: auto; }
    .footer-wave { line-height: 0; margin-bottom: -1px; }
    .footer-main { background: var(--primary-dark); color: var(--white); padding: 3rem 0 2rem; }
    .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 3rem; }
    .footer-brand { max-width: 400px; }
    .footer-logo { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .footer-logo-icon { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; background: var(--primary-light); border-radius: var(--radius-md); color: var(--white); }
    .footer-logo-text { font-family: 'Playfair Display'; font-size: 1.1rem; font-weight: 600; }
    .footer-desc { font-size: 0.9rem; color: rgba(255,255,255,0.7); line-height: 1.7; margin-bottom: 1.5rem; }
    .footer-social { display: flex; gap: 0.5rem; }
    .social-link { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; background: rgba(255,255,255,0.1); border-radius: var(--radius-full); color: var(--white); transition: all 0.3s; }
    .social-link:hover { background: var(--primary-light); transform: translateY(-3px); }
    .footer-heading { font-size: 0.875rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--white); margin-bottom: 1.5rem; }
    .footer-links { list-style: none; }
    .footer-link { display: block; padding: 0.25rem 0; font-size: 0.9rem; color: rgba(255,255,255,0.7); transition: all 0.3s; }
    .footer-link:hover { color: var(--primary-lighter); padding-left: 0.5rem; }
    .footer-contact { list-style: none; }
    .contact-item { display: flex; align-items: flex-start; gap: 0.5rem; padding: 0.25rem 0; font-size: 0.9rem; color: rgba(255,255,255,0.7); }
    .contact-item svg { flex-shrink: 0; margin-top: 3px; color: var(--primary-lighter); }
    .footer-bottom { background: #142D23; padding: 1.5rem 0; text-align: center; }
    .copyright { font-size: 0.85rem; color: rgba(255,255,255,0.5); display: flex; align-items: center; justify-content: center; gap: 0.25rem; }
    .copyright svg { color: #e74c3c; }

    /* === PAGE HEADER === */
    .page-header { position: relative; padding: 8rem 0 4rem; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 50%, var(--primary-medium) 100%); color: var(--white); overflow: hidden; }
    .page-header::before { content: ''; position: absolute; inset: 0; background: url('images/hero-gunung-mas.jpg') center/cover; opacity: 0.15; }
    .page-header .container { position: relative; z-index: 1; }
    .page-header h1 { font-size: clamp(2rem, 5vw, 3rem); color: var(--white); margin-bottom: 0.5rem; }
    .page-header p { font-size: 1.1rem; opacity: 0.9; max-width: 500px; }

    /* === TRANSITIONS === */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    .slide-down-enter-active, .slide-down-leave-active { transition: all 0.3s; }
    .slide-down-enter-from, .slide-down-leave-to { opacity: 0; transform: translateY(-10px); }

    /* === REVEAL === */
    .reveal { opacity: 0; transform: translateY(40px); transition: all 0.7s; }
    .reveal.active { opacity: 1; transform: translateY(0); }
    .stagger-1 { transition-delay: 0.1s; }
    .stagger-2 { transition-delay: 0.2s; }
    .stagger-3 { transition-delay: 0.3s; }
    .stagger-4 { transition-delay: 0.4s; }
    .stagger-5 { transition-delay: 0.5s; }
    .stagger-6 { transition-delay: 0.6s; }

    /* === ANIMATIONS === */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    .animate-fade-in-up { animation: fadeInUp 0.6s ease forwards; }

    /* === APP === */
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; }

    /* ============================================
       RESPONSIVE - MEDIA QUERIES
       ============================================ */
    @media (max-width: 1024px) {
      .container { padding: 0 1.5rem; }
      .section { padding: 4rem 0; }
      .page-header { padding: 7rem 0 3rem; }
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 2rem; }
      .footer-brand { grid-column: 1/-1; max-width: 100%; }
    }
    @media (max-width: 768px) {
      .container { padding: 0 1rem; }
      .section { padding: 3rem 0; }
      .page-header { padding: 6rem 0 2.5rem; }
      .btn { padding: 0.75rem 1.5rem; font-size: 0.875rem; }
      .navbar-nav { display: none; }
      .menu-toggle { display: flex; }
      .navbar-mobile { display: block; }
      .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
      .footer-brand { grid-column: 1; }
      .footer-main { padding: 2.5rem 0 1.5rem; }
    }
    @media (max-width: 480px) {
      .section-title { font-size: 1.5rem; }
      .page-header h1 { font-size: 1.75rem; }
    }

    /* ====== HOME PAGE ====== */
    .hero { position: relative; height: 100vh; min-height: 700px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .hero-image { position: absolute; inset: 0; z-index: 0; }
    .hero-image img { width: 100%; height: 100%; object-fit: cover; }
    .hero-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(27,67,50,0.85) 0%, rgba(45,106,79,0.75) 50%, rgba(64,145,108,0.6) 100%); }
    .hero-content { position: relative; z-index: 1; width: 100%; text-align: center; color: var(--white); padding: 0 1rem; }
    .hero-label { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.15em; color: var(--primary-lighter); margin-bottom: 1rem; }
    .label-dot { width: 8px; height: 8px; background: var(--accent-light); border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .hero-title { font-size: clamp(2.5rem, 6vw, 4.5rem); font-weight: 700; color: var(--white); line-height: 1.1; margin-bottom: 1rem; text-shadow: 0 2px 20px rgba(0,0,0,0.2); }
    .hero-subtitle { font-size: clamp(1rem, 2vw, 1.2rem); color: rgba(255,255,255,0.9); max-width: 650px; margin: 0 auto 1.5rem; line-height: 1.7; }
    .hero-subtitle strong { color: var(--accent-light); }
    .hero-actions { display: flex; align-items: center; justify-content: center; gap: 1rem; margin-bottom: 4rem; flex-wrap: wrap; }
    .hero-stats { display: flex; align-items: center; justify-content: center; gap: 4rem; }
    .stat-item { display: flex; flex-direction: column; align-items: center; gap: 0.25rem; }
    .stat-number { font-family: 'Playfair Display'; font-size: 2rem; font-weight: 700; color: var(--white); }
    .stat-label { font-size: 0.8rem; font-weight: 500; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.1em; }
    .hero-scroll { position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%); z-index: 1; }
    .scroll-indicator { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; color: rgba(255,255,255,0.7); font-size: 0.75rem; font-weight: 500; animation: bounce 2s infinite; }

    .featured-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; }
    .featured-card { background: var(--white); border-radius: var(--radius-lg); padding: 2.5rem 1.5rem; text-align: center; box-shadow: var(--shadow-md); transition: all 0.3s; }
    .featured-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-xl); }
    .featured-icon { display: inline-flex; align-items: center; justify-content: center; width: 64px; height: 64px; background: var(--primary-lightest); color: var(--primary); border-radius: var(--radius-xl); margin-bottom: 1.5rem; transition: all 0.3s; }
    .featured-card:hover .featured-icon { background: var(--primary); color: var(--white); }
    .featured-title { font-size: 1.15rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--gray-900); }
    .featured-text { font-size: 0.9rem; color: var(--gray-600); line-height: 1.6; }

    .cta-card { display: grid; grid-template-columns: 1fr 1fr; align-items: center; background: var(--white); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); }
    .cta-content { padding: 3rem; }
    .cta-title { font-size: clamp(1.5rem, 3vw, 2.25rem); margin-bottom: 1rem; }
    .cta-text { color: var(--gray-600); margin-bottom: 1.5rem; line-height: 1.7; }
    .cta-image { height: 100%; min-height: 350px; }
    .cta-image img { width: 100%; height: 100%; object-fit: cover; }

    .info-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .info-card { display: flex; align-items: center; gap: 1.5rem; padding: 1.5rem; background: var(--gray-100); border-radius: var(--radius-lg); transition: all 0.3s; }
    .info-card:hover { background: var(--primary-lightest); transform: translateY(-4px); }
    .info-card .info-icon { display: flex; align-items: center; justify-content: center; width: 52px; height: 52px; background: var(--primary); color: var(--white); border-radius: var(--radius-md); flex-shrink: 0; }
    .info-content h4 { font-family: 'Plus Jakarta Sans'; font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--gray-900); }
    .info-content p { font-size: 0.875rem; color: var(--gray-600); }

    /* ====== EXPLORE PAGE ====== */
    .overview-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
    .overview-image { border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); }
    .overview-image img { width: 100%; height: 100%; object-fit: cover; min-height: 400px; }
    .overview-text { color: var(--gray-600); line-height: 1.8; margin-bottom: 1rem; }
    .overview-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
    .tag { padding: 0.25rem 1rem; background: var(--primary-lightest); color: var(--primary); font-size: 0.8rem; font-weight: 600; border-radius: var(--radius-full); }

    .info-cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }
    .info-card-item { background: var(--white); padding: 1.5rem; border-radius: var(--radius-lg); text-align: center; box-shadow: var(--shadow-sm); transition: all 0.3s; }
    .info-card-item:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
    .info-card-icon { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: var(--primary-lightest); color: var(--primary); border-radius: var(--radius-full); margin-bottom: 0.75rem; }
    .info-card-item h3 { font-family: 'Plus Jakarta Sans'; font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
    .info-card-item p { font-size: 0.85rem; color: var(--gray-600); line-height: 1.5; }

    .attractions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; }
    .attraction-card { background: var(--white); border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-md); transition: all 0.3s; }
    .attraction-card:hover { transform: translateY(-8px); box-shadow: var(--shadow-xl); }
    .attraction-image { position: relative; height: 240px; overflow: hidden; }
    .attraction-image img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }
    .attraction-card:hover .attraction-image img { transform: scale(1.08); }
    .attraction-badge { position: absolute; top: 1rem; right: 1rem; display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem 0.75rem; background: var(--accent); color: var(--white); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; border-radius: var(--radius-full); }
    .attraction-body { padding: 1.5rem; }
    .attraction-title { font-family: 'Playfair Display'; font-size: 1.25rem; font-weight: 600; margin-bottom: 0.5rem; }
    .attraction-desc { font-size: 0.9rem; color: var(--gray-600); line-height: 1.6; margin-bottom: 1rem; }
    .attraction-meta { display: flex; gap: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--gray-200); }
    .meta-item { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; color: var(--gray-500); }

    .activities-filter { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .filter-btn { padding: 0.5rem 1.25rem; font-family: 'Plus Jakarta Sans'; font-size: 0.875rem; font-weight: 500; color: var(--gray-600); background: var(--white); border: 2px solid transparent; border-radius: var(--radius-full); cursor: pointer; transition: all 0.3s; }
    .filter-btn:hover { border-color: var(--primary-light); color: var(--primary); }
    .filter-active { background: var(--primary) !important; color: var(--white) !important; border-color: var(--primary) !important; }
    .activities-list { display: flex; flex-direction: column; gap: 0.75rem; max-width: 900px; margin: 0 auto; }
    .activity-item { display: grid; grid-template-columns: auto 1fr auto; align-items: center; gap: 1.5rem; padding: 1.5rem; background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); transition: all 0.3s; }
    .activity-item:hover { box-shadow: var(--shadow-md); transform: translateX(8px); }
    .activity-number { font-family: 'Playfair Display'; font-size: 1.5rem; font-weight: 700; color: var(--primary-lighter); min-width: 40px; }
    .activity-name { font-family: 'Plus Jakarta Sans'; font-size: 1.1rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--gray-900); }
    .activity-desc { font-size: 0.85rem; color: var(--gray-600); line-height: 1.5; margin-bottom: 0.5rem; }
    .activity-tags { display: flex; gap: 0.25rem; flex-wrap: wrap; }
    .activity-tag { padding: 2px 10px; background: var(--primary-lightest); color: var(--primary); font-size: 0.7rem; font-weight: 600; border-radius: var(--radius-full); }
    .activity-price { font-family: 'Playfair Display'; font-size: 1.1rem; font-weight: 700; color: var(--primary); white-space: nowrap; }

    .lh-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .lh-card { padding: 2.5rem; border-radius: var(--radius-xl); }
    .lh-icon { display: inline-flex; align-items: center; justify-content: center; width: 56px; height: 56px; background: var(--primary); color: var(--white); border-radius: var(--radius-lg); margin-bottom: 1.5rem; }
    .lh-card h3 { font-size: 1.25rem; margin-bottom: 1rem; color: var(--gray-900); }
    .lh-card p { font-size: 0.9rem; color: var(--gray-600); line-height: 1.7; margin-bottom: 1rem; }
    .lh-list { list-style: none; }
    .lh-list li { display: flex; align-items: center; gap: 0.5rem; padding: 0.25rem 0; font-size: 0.9rem; color: var(--gray-700); }
    .lh-list li svg { flex-shrink: 0; color: var(--primary); }

    /* ====== GALLERY PAGE ====== */
    .gallery-filters { display: flex; justify-content: center; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .gallery-grid { display: grid; grid-template-columns: repeat(4, 1fr); grid-auto-rows: 250px; gap: 1rem; }
